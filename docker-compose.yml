services:
  db:
    image: postgres:16-alpine
    container_name: wallmark_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wallmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallmark}
      POSTGRES_DB: ${POSTGRES_DB:-wallmark}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallmark}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: wallmark_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wallmark}:${POSTGRES_PASSWORD:-wallmark}@db:5432/${POSTGRES_DB:-wallmark}
    command: >
      sh -c "python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: wallmark_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
